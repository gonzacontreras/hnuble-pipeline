name: W12 Annotation Listener

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: w12-annot
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Poll ntfy and dispatch W14
        env:
          NTFY_TOPIC_ANNOTATIONS: ${{ secrets.NTFY_TOPIC_ANNOTATIONS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/w12_annotation_listener.py
      - name: Commit state
        run: |
          git config user.name "hnuble-bot"
          git config user.email "bot@hnuble.io"
          for f in state/annotations.json state/claude_live.json; do
            [ -f "$f" ] && git add "$f" || echo "skip missing $f"
          done
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "W12: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "push attempt $i failed, retrying in 3s"
              sleep 3
            done
          fi
      - name: Dispatch W14 if new annotations
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f state/w14_dispatch_ids.txt ]; then
            IDS=$(cat state/w14_dispatch_ids.txt)
            if [ -n "$IDS" ]; then
              echo "Dispatching W14 with: $IDS"
              gh workflow run w14-master.yml --field "annotation_ids=$IDS"
            fi
          else
            echo "No new annotations to dispatch"
          fi
