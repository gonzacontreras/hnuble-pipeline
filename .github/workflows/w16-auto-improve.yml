name: W16 Auto-Improver

on:
  schedule:
    - cron: '15,45 * * * *'  # Every 30 minutes (hh:15 and hh:45)
  workflow_dispatch:

concurrency:
  group: w16-improve
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run auto-improver
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/w16_auto_improver.py
      - name: Commit state
        run: |
          git config user.name "hnuble-bot"
          git config user.email "bot@hnuble.io"
          git add state/manuscript_improved.md state/improvement_log.json state/claude_live.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "W16: auto-improve $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "push attempt $i failed, retrying in 3s"
              sleep 3
            done
          fi
