name: W13 EID Scorer

on:
  workflow_dispatch:
  repository_dispatch:
    types: [score-run]

concurrency:
  group: w13-score
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Compute EID score
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/w13_eid_scorer.py
      - name: Commit state
        run: |
          git config user.name "hnuble-bot"
          git config user.email "bot@hnuble.io"
          git add state/eid_score.json state/claude_live.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "W13: score update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
