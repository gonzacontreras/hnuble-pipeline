name: W10 Blindaje Upgrader

on:
  workflow_dispatch:
  repository_dispatch:
    types: [bu-run]

concurrency:
  group: w10-bu
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/w10_blindaje_upgrader.py
      - name: Commit state updates
        run: |
          git config user.name "hnuble-bot"
          git config user.email "bot@hnuble.io"
          git add state/
          if git diff --staged --quiet; then
            echo "no state changes"
          else
            git commit -m "W10: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
      - name: Trigger W8 HIL dispatcher
        run: gh workflow run w8-hil.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
