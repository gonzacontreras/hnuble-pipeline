name: W8 HIL Dispatcher

on:
  workflow_dispatch:
  repository_dispatch:
    types: [hil-dispatch]
  schedule:
    - cron: '*/30 * * * *'

concurrency:
  group: w8-hil
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/w8_hil_ntfy.py
      - name: Commit state updates
        run: |
          git config user.name "hnuble-bot"
          git config user.email "bot@hnuble.io"
          git add state/
          if git diff --staged --quiet; then
            echo "no state changes"
          else
            git commit -m "W8: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
