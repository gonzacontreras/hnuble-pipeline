name: W6 Model Stability

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: w6-stability
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  stability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/w6_model_stability.py
      - name: Commit state updates
        run: |
          git config user.name "hnuble-bot"
          git config user.email "bot@hnuble.io"
          git add state/
          if git diff --staged --quiet; then
            echo "no state changes"
          else
            git commit -m "W6: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
