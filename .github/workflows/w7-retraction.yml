name: W7 Retraction Check

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: w7-retraction
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/w7_retraction_check.py

      - name: Commit state updates
        run: |
          git config user.name "hnuble-bot"
          git config user.email "bot@hnuble.io"
          git add state/
          if git diff --staged --quiet; then
            echo "no state changes"
          else
            git commit -m "W7: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
