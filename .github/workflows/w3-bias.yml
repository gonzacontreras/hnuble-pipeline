name: W3 Bias Hunter

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: w3-bias
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GH_DISPATCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/w3_bias_hunter.py
      - name: Commit state updates
        run: |
          git config user.name "hnuble-bot"
          git config user.email "bot@hnuble.io"
          git add state/
          if git diff --staged --quiet; then
            echo "no state changes"
          else
            git commit -m "W3: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
