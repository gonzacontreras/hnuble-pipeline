<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paper Actual · EID v5 CONDENSED · Hantavirus Ñuble</title>
<!-- marked.js for safe Markdown rendering (tables, lists, etc.) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
<style>
  :root{
    --bg:#fafbfc;
    --paper-bg:#ffffff;
    --ink:#1f2328;
    --muted:#57606a;
    --rule:#d0d7de;
    --accent:#0969da;
    --yellow:#fff3b8;
    --yellow-edge:#d4a600;
    --green:#c8e6c9;
    --green-edge:#2e7d32;
    --red:#ffcdd2;
    --red-edge:#c62828;
    --panel-bg:#f7f8fa;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:Georgia,"Times New Roman",Times,serif;line-height:1.7}
  header.topbar{
    position:sticky;top:0;z-index:10;background:#ffffffee;backdrop-filter:blur(6px);
    border-bottom:1px solid var(--rule);padding:.7em 1.2em;display:flex;align-items:center;gap:1em;flex-wrap:wrap;
    font-family:system-ui,-apple-system,sans-serif;
  }
  header.topbar h1{margin:0;font-size:1.05em;font-weight:600}
  header.topbar .meta{color:var(--muted);font-size:.85em}
  header.topbar nav{margin-left:auto;display:flex;gap:.8em;font-size:.85em}
  header.topbar nav a{color:var(--accent);text-decoration:none}
  header.topbar nav a:hover{text-decoration:underline}
  main{display:grid;grid-template-columns:minmax(0,1.8fr) minmax(280px,1fr);gap:1.5em;padding:1.2em;max-width:1500px;margin:0 auto}
  @media (max-width: 960px){ main{grid-template-columns:1fr} }
  .paper{
    background:var(--paper-bg);border:1px solid var(--rule);border-radius:6px;
    padding:2.2em 2.6em;max-width:820px;margin:0 auto;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .paper h1.doctitle{font-size:1.35em;line-height:1.35;margin:.2em 0 .6em;font-family:Georgia,serif;font-weight:700}
  .paper h2{font-size:1.08em;margin:1.6em 0 .5em;font-family:system-ui,sans-serif;color:#0b2447;border-bottom:1px solid var(--rule);padding-bottom:.25em}
  .paper h3{font-size:.98em;margin:1.1em 0 .4em;font-family:system-ui,sans-serif;color:#1a365d;font-weight:600}
  .paper p{margin:.55em 0;text-align:justify;hyphens:auto}
  .paper .section-banner{margin:1.5em 0 .4em;font-family:system-ui,sans-serif;font-weight:600;font-size:1.08em;color:#0b2447;border-bottom:1px solid var(--rule);padding-bottom:.25em}
  .paper .para-block{position:relative;padding:.15em .2em .15em 2.6em;border-radius:4px;transition:background .15s}
  .paper .para-block:hover{background:#f3f6fa}
  .paper .para-block .para-num{
    position:absolute;left:.2em;top:.3em;font-family:ui-monospace,Consolas,monospace;
    color:#8b949e;font-size:.72em;user-select:none;width:2em;text-align:right
  }
  .paper table{border-collapse:collapse;margin:.8em 0;font-size:.88em;width:100%}
  .paper table th,.paper table td{border:1px solid #d0d7de;padding:.3em .6em;text-align:left}
  .paper table th{background:#f1f3f5}
  .paper pre{background:#f6f8fa;border:1px solid var(--rule);padding:.6em .9em;border-radius:4px;font-size:.82em;overflow-x:auto;font-family:ui-monospace,Consolas,monospace;white-space:pre-wrap}
  .paper code{background:#f1f3f5;padding:.08em .3em;border-radius:3px;font-size:.9em;font-family:ui-monospace,Consolas,monospace}
  /* Highlights */
  mark.hl-yellow{background:var(--yellow);border-bottom:2px solid var(--yellow-edge);padding:.05em 0}
  mark.hl-green{background:var(--green);border-bottom:2px solid var(--green-edge);padding:.05em 0}
  mark.hl-red{background:var(--red);border-bottom:2px solid var(--red-edge);padding:.05em 0}
  /* Side panel */
  aside.sidebar{
    background:var(--panel-bg);border:1px solid var(--rule);border-radius:6px;
    padding:1.2em 1.1em;font-family:system-ui,-apple-system,sans-serif;font-size:.88em;
    position:sticky;top:70px;max-height:calc(100vh - 90px);overflow-y:auto;align-self:start;line-height:1.45
  }
  aside.sidebar h2{margin-top:0;font-size:.95em;color:#0b2447}
  aside.sidebar .count-pill{display:inline-block;background:#ffffff;border:1px solid var(--rule);border-radius:999px;padding:.1em .6em;font-size:.78em;margin-left:.4em}
  aside.sidebar .annot-item{border-top:1px solid var(--rule);padding:.6em 0;font-size:.85em}
  aside.sidebar .annot-item:first-of-type{border-top:none}
  aside.sidebar .annot-color{display:inline-block;width:.7em;height:.7em;border-radius:50%;margin-right:.4em;vertical-align:middle}
  aside.sidebar .annot-color.yellow{background:var(--yellow-edge)}
  aside.sidebar .annot-color.green{background:var(--green-edge)}
  aside.sidebar .annot-color.red{background:var(--red-edge)}
  aside.sidebar .annot-meta{color:var(--muted);font-size:.76em}
  aside.sidebar .annot-sel{font-style:italic;font-size:.82em;margin:.25em 0;padding:.3em .5em;background:#fff;border-left:3px solid var(--rule);border-radius:2px;word-break:break-word}
  aside.sidebar .annot-comment{font-size:.83em;color:#24292f}
  aside.sidebar .empty-hint{color:var(--muted);font-style:italic}
  /* Popover */
  .popover{
    position:absolute;display:none;background:#ffffff;border:1px solid var(--rule);
    border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.12);padding:.5em;z-index:100;
    font-family:system-ui,sans-serif
  }
  .popover.visible{display:flex;gap:.35em}
  .popover button{
    border:1px solid var(--rule);background:#fff;border-radius:6px;padding:.35em .55em;cursor:pointer;
    font-size:1.05em;line-height:1
  }
  .popover button:hover{background:#f1f3f5}
  .popover button .shortcut{font-size:.6em;color:var(--muted);margin-left:.25em;font-family:ui-monospace,monospace}
  /* Modal */
  .modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:200}
  .modal-mask.visible{display:flex}
  .modal{background:#fff;border-radius:8px;max-width:560px;width:90%;padding:1.4em;box-shadow:0 10px 30px rgba(0,0,0,.25);font-family:system-ui,sans-serif}
  .modal h3{margin:0 0 .4em;font-size:1.1em}
  .modal .sel-preview{background:#f7f8fa;border:1px solid var(--rule);border-radius:4px;padding:.6em .8em;margin:.4em 0;font-size:.85em;max-height:120px;overflow-y:auto;white-space:pre-wrap}
  .modal textarea{width:100%;min-height:90px;padding:.5em;border:1px solid var(--rule);border-radius:4px;font-family:inherit;font-size:.9em;resize:vertical}
  .modal .actions{display:flex;gap:.5em;justify-content:flex-end;margin-top:.9em}
  .modal button{border:1px solid var(--rule);background:#fff;border-radius:4px;padding:.55em 1em;cursor:pointer;font-size:.88em}
  .modal button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .modal button:disabled{opacity:.5;cursor:not-allowed}
  /* Toast */
  .toast{position:fixed;bottom:1.3em;right:1.3em;background:#2e7d32;color:#fff;padding:.7em 1.1em;border-radius:6px;font-family:system-ui,sans-serif;font-size:.88em;box-shadow:0 4px 12px rgba(0,0,0,.18);opacity:0;transform:translateY(14px);transition:all .25s;z-index:300}
  .toast.visible{opacity:1;transform:translateY(0)}
  .toast.err{background:#c62828}
  /* Loading state */
  .loading{color:var(--muted);font-style:italic;padding:2em;text-align:center}
  .error{color:var(--red-edge);padding:1.2em;background:#fff5f5;border:1px solid var(--red);border-radius:4px}
  .shortcut-hint{font-size:.76em;color:var(--muted);margin-top:.3em;font-family:system-ui,sans-serif}
</style>
</head>
<body>

<header class="topbar">
  <h1>Paper Actual · EID v5 CONDENSED</h1>
  <span class="meta" id="meta-stats">cargando&hellip;</span>
  <nav>
    <a href="index.html">&larr; Inicio</a>
    <a href="paper-improved.html">Paper Mejorado &rarr;</a>
  </nav>
</header>

<main>
  <article class="paper" id="paper-root" aria-label="manuscrito EID">
    <p class="loading">Cargando manuscrito&hellip;</p>
  </article>

  <aside class="sidebar" aria-label="anotaciones">
    <h2>Anotaciones <span class="count-pill" id="annot-count">0</span></h2>
    <p class="shortcut-hint">Atajos tras seleccionar texto: <code>Y</code> amarillo, <code>G</code> verde, <code>R</code> rojo. Escape cancela.</p>
    <div id="annot-list">
      <p class="empty-hint">No hay anotaciones aún. Selecciona texto en el manuscrito para empezar.</p>
    </div>
  </aside>
</main>

<div class="popover" id="popover" role="toolbar" aria-label="anotar seleccion">
  <button data-color="yellow" aria-label="Nota amarilla (Y)">🟡<span class="shortcut">Y</span></button>
  <button data-color="green" aria-label="Sugerir mejora verde (G)">🟢<span class="shortcut">G</span></button>
  <button data-color="red" aria-label="Reportar error rojo (R)">🔴<span class="shortcut">R</span></button>
</div>

<div class="modal-mask" id="modal-mask" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <h3 id="modal-title">Nueva anotación</h3>
    <div><strong>Color:</strong> <span id="modal-color"></span></div>
    <div><strong>Párrafo:</strong> <span id="modal-para"></span></div>
    <div class="sel-preview" id="modal-selection"></div>
    <label for="modal-comment" style="font-size:.85em;display:block;margin-top:.4em"><strong>Comentario</strong> (opcional, ≤2000 chars):</label>
    <textarea id="modal-comment" maxlength="2000" placeholder="¿Qué anotas? (dudas, sugerencias, errores)"></textarea>
    <div class="actions">
      <button id="modal-cancel">Cancelar</button>
      <button id="modal-submit" class="primary">Enviar a W14</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* =========================================================================
 *  paper-current.html — B4.2
 *  Annotatable EID manuscript. Loads state/manuscript_v5_condensed.json,
 *  renders paragraphs with markdown, handles selection → popover → modal →
 *  ntfy POST pipeline, persists to localStorage, displays existing
 *  annotations from localStorage + state/annotations.json.
 *  =======================================================================*/

const LS_KEY = "hnuble_annotations";
const FALLBACK_TOPIC = "hnuble-annot-test-demo";

// State
let manuscript = null;
let annotations = [];   // merged, deduped by annotation_id
let ntfyTopic = FALLBACK_TOPIC;
let currentSelection = null; // {paraId, section, start, end, text, rect}

// ------- Utilities ----------------------------------------------------------
function $(sel, root=document){ return root.querySelector(sel); }
function $$(sel, root=document){ return Array.from(root.querySelectorAll(sel)); }

function nowIso(){ return new Date().toISOString().replace(/\.\d{3}Z$/, "Z"); }

function randomId(){
  const r = Math.random().toString(36).slice(2, 8);
  const ts = new Date().toISOString().slice(0,10);
  return `ann-${ts}-${r}`;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function showToast(msg, isError=false){
  const t = $("#toast");
  t.textContent = msg;
  t.classList.toggle("err", !!isError);
  t.classList.add("visible");
  setTimeout(()=>t.classList.remove("visible"), 3100);
}

// ------- localStorage helpers ----------------------------------------------
function loadLocalAnnots(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){
    console.warn("local annots corrupt", e);
    return [];
  }
}
function saveLocalAnnots(arr){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(arr)); }
  catch(e){ console.warn("localStorage full", e); }
}

function mergeAnnots(local, remote){
  const map = new Map();
  [...local, ...remote].forEach(a => {
    if(a && a.annotation_id){ map.set(a.annotation_id, a); }
  });
  return Array.from(map.values());
}

// ------- Rendering ----------------------------------------------------------
function renderManuscript(){
  const root = $("#paper-root");
  if(!manuscript){ return; }
  const title = manuscript.metadata?.title || "Manuscrito";
  let html = `<h1 class="doctitle">${escapeHtml(title)}</h1>`;

  // Group paragraphs by section, main-text only.
  const mainParas = manuscript.paragraphs.filter(p => p.is_main_text);
  let lastSection = null;
  let lastSubsection = null;

  for(const p of mainParas){
    if(p.section !== lastSection){
      html += `<div class="section-banner">${escapeHtml(p.section)}</div>`;
      lastSection = p.section;
      lastSubsection = null;
    }
    if(p.subsection && p.subsection !== lastSubsection){
      html += `<h3>${escapeHtml(p.subsection)}</h3>`;
      lastSubsection = p.subsection;
    }
    // Render paragraph text as markdown (handles bold, lists, tables, italics).
    const rendered = marked.parse(p.text, {gfm:true, breaks:false});
    html += `<div class="para-block" data-para-id="${p.id}" data-section="${escapeHtml(p.section)}"><span class="para-num" aria-hidden="true">¶${p.id}</span>${rendered}</div>`;
  }
  root.innerHTML = html;
  applyHighlights();
}

function applyHighlights(){
  // Reset and apply highlights for any annotation whose para still exists.
  // Because we cannot cleanly re-range text across DOM trees, we do a plain
  // string-replace on the innerHTML of each para-block. This works because
  // rendered markdown preserves the verbatim chars used in selectedText in
  // the vast majority of cases.
  $$(".para-block", $("#paper-root")).forEach(block => {
    const pid = Number(block.dataset.paraId);
    const relevant = annotations.filter(a => Number(a.para_id) === pid);
    if(relevant.length === 0) return;
    let html = block.innerHTML;
    // Apply longest first to avoid nested replacements breaking offsets.
    relevant
      .slice()
      .sort((a,b) => (b.selected_text?.length || 0) - (a.selected_text?.length || 0))
      .forEach(a => {
        const safe = escapeHtml(a.selected_text || "");
        if(!safe) return;
        const cssClass = `hl-${a.color || "yellow"}`;
        const marker = `<mark class="${cssClass}" data-ann="${escapeHtml(a.annotation_id)}" title="${escapeHtml(a.comment||"")}">${safe}</mark>`;
        // Replace the first occurrence only.
        const idx = html.indexOf(safe);
        if(idx >= 0){
          html = html.slice(0, idx) + marker + html.slice(idx + safe.length);
        }
      });
    block.innerHTML = html;
  });
}

function renderAnnotList(){
  const list = $("#annot-list");
  $("#annot-count").textContent = annotations.length;
  if(annotations.length === 0){
    list.innerHTML = `<p class="empty-hint">No hay anotaciones aún. Selecciona texto en el manuscrito para empezar.</p>`;
    return;
  }
  const sorted = annotations.slice().sort((a,b) => (b.ts||"").localeCompare(a.ts||""));
  list.innerHTML = sorted.map(a => {
    const colorClass = (a.color || "yellow").toLowerCase();
    const ts = a.ts ? new Date(a.ts).toLocaleString() : "";
    return `
      <div class="annot-item" data-ann="${escapeHtml(a.annotation_id)}">
        <div><span class="annot-color ${colorClass}"></span><strong>¶${a.para_id}</strong> <span class="annot-meta">${escapeHtml(a.para_section||"")}</span></div>
        <div class="annot-sel">"${escapeHtml((a.selected_text||"").slice(0,180))}${(a.selected_text||"").length>180?"…":""}"</div>
        ${a.comment ? `<div class="annot-comment">${escapeHtml(a.comment)}</div>` : ""}
        <div class="annot-meta">${escapeHtml(ts)} · <code>${escapeHtml(a.annotation_id)}</code></div>
      </div>
    `;
  }).join("");
}

// ------- Selection → popover → modal ---------------------------------------
function onMouseUp(){
  // Defer so selection is stable.
  setTimeout(()=>{
    const sel = window.getSelection();
    if(!sel || sel.isCollapsed){ hidePopover(); return; }
    const range = sel.getRangeAt(0);
    const text = sel.toString().trim();
    if(!text || text.length < 2){ hidePopover(); return; }
    // Find enclosing .para-block.
    let node = range.commonAncestorContainer;
    if(node.nodeType === Node.TEXT_NODE) node = node.parentNode;
    const block = node.closest?.(".para-block");
    if(!block){ hidePopover(); return; }
    const paraId = Number(block.dataset.paraId);
    const section = block.dataset.section || "";
    // Compute offsets relative to the paragraph's raw text using the original manuscript text.
    const paraObj = manuscript.paragraphs.find(p => p.id === paraId);
    if(!paraObj){ hidePopover(); return; }
    const idx = paraObj.text.indexOf(text);
    const start = idx >= 0 ? idx : 0;
    const end = idx >= 0 ? idx + text.length : text.length;
    // Position popover.
    const rect = range.getBoundingClientRect();
    currentSelection = {paraId, section, start, end, text};
    showPopover(rect);
  }, 0);
}

function showPopover(rect){
  const pop = $("#popover");
  pop.classList.add("visible");
  const top = window.scrollY + rect.top - 44;
  const left = window.scrollX + rect.left + rect.width/2 - 90;
  pop.style.top = `${Math.max(top, window.scrollY+8)}px`;
  pop.style.left = `${Math.max(left, 8)}px`;
}
function hidePopover(){ $("#popover").classList.remove("visible"); }

function onColorClick(color){
  hidePopover();
  if(!currentSelection) return;
  // Populate modal.
  $("#modal-color").textContent = color;
  $("#modal-para").textContent = `¶${currentSelection.paraId} (${currentSelection.section})`;
  $("#modal-selection").textContent = currentSelection.text;
  $("#modal-comment").value = "";
  $("#modal-mask").classList.add("visible");
  $("#modal-mask").dataset.color = color;
  setTimeout(()=> $("#modal-comment").focus(), 30);
}

function closeModal(){ $("#modal-mask").classList.remove("visible"); }

async function submitAnnotation(){
  if(!currentSelection) return;
  const color = $("#modal-mask").dataset.color;
  const comment = $("#modal-comment").value.trim().slice(0, 2000);
  const payload = {
    schema_version: "v1",
    annotation_id: randomId(),
    para_id: currentSelection.paraId,
    selection_start: currentSelection.start,
    selection_end: currentSelection.end,
    selected_text: currentSelection.text.slice(0, 2000),
    color,
    comment,
    ts: nowIso(),
    user_agent: navigator.userAgent.slice(0, 512),
    para_section: currentSelection.section.slice(0, 64),
    prior_annotations_count: annotations.length
  };
  // Save locally first so UX is instant even if POST fails.
  const local = loadLocalAnnots();
  local.push(payload);
  saveLocalAnnots(local);
  annotations = mergeAnnots(local, annotations);
  renderAnnotList();
  applyHighlights();
  closeModal();
  // POST to ntfy.
  const url = `https://ntfy.sh/${ntfyTopic}`;
  try{
    const r = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Title": `Annotation ${payload.annotation_id}`,
        "Priority": "default",
        "Tags": `annotation,${color}`
      },
      body: JSON.stringify(payload)
    });
    if(r.ok){
      showToast(`Enviada · ID ${payload.annotation_id}`);
    }else{
      showToast(`Guardada local · ntfy ${r.status}`, true);
    }
  }catch(e){
    showToast(`Guardada local · ntfy offline`, true);
    console.warn("ntfy post failed", e);
  }
  currentSelection = null;
}

// ------- Data loading -------------------------------------------------------
async function loadTopic(){
  try{
    const r = await fetch("state/annotation_ntfy_topic.txt", {cache:"no-store"});
    if(r.ok){
      const t = (await r.text()).trim();
      if(t) ntfyTopic = t;
    }
  }catch(e){ /* fallback */ }
}

async function loadManuscript(){
  const r = await fetch("state/manuscript_v5_condensed.json", {cache:"no-store"});
  if(!r.ok) throw new Error(`manuscript fetch ${r.status}`);
  manuscript = await r.json();
}

async function loadRemoteAnnots(){
  try{
    const r = await fetch("state/annotations.json", {cache:"no-store"});
    if(!r.ok) return [];
    const j = await r.json();
    return (j.items || []);
  }catch(e){ return []; }
}

async function boot(){
  try{
    await Promise.all([loadTopic(), loadManuscript()]);
    const remote = await loadRemoteAnnots();
    const local = loadLocalAnnots();
    annotations = mergeAnnots(local, remote);
    $("#meta-stats").textContent =
      `${manuscript.total_paragraphs} párrafos · ${manuscript.total_words} palabras · ${manuscript.total_refs} refs · topic ${ntfyTopic}`;
    renderManuscript();
    renderAnnotList();
  }catch(e){
    $("#paper-root").innerHTML = `<div class="error">Error cargando manuscrito: ${escapeHtml(e.message)}<br><small>Asegúrate de que <code>state/manuscript_v5_condensed.json</code> existe. Ejecuta <code>python scripts/build_manuscript_json.py</code>.</small></div>`;
    console.error(e);
  }
}

// ------- Event wiring -------------------------------------------------------
document.addEventListener("mouseup", onMouseUp);
document.addEventListener("mousedown", (e) => {
  if(!e.target.closest("#popover")) hidePopover();
});
$$("#popover button").forEach(btn => {
  btn.addEventListener("click", () => onColorClick(btn.dataset.color));
});
$("#modal-cancel").addEventListener("click", closeModal);
$("#modal-submit").addEventListener("click", submitAnnotation);
document.addEventListener("keydown", (e) => {
  if($("#modal-mask").classList.contains("visible")){
    if(e.key === "Escape") closeModal();
    return;
  }
  if(currentSelection){
    if(e.key === "y" || e.key === "Y"){ onColorClick("yellow"); }
    else if(e.key === "g" || e.key === "G"){ onColorClick("green"); }
    else if(e.key === "r" || e.key === "R"){ onColorClick("red"); }
    else if(e.key === "Escape"){ hidePopover(); currentSelection=null; }
  }
});

boot();
</script>
</body>
</html>
